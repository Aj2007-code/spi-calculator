<script>
const gradePoints = {
    AA:10, AB:9, BB:8, BC:7,
    CC:6, CD:5, DD:4, F:0
};

const common = [
    {name:"Mathematics", c:4},
    {name:"Indian Knowledge System", c:3},
    {name:"Computer Science", c:4.5}
];

const physics = [
    {name:"Physics", c:5.5},
    {name:"Electrical", c:4.5},
    {name:"Engineering Graphics", c:2.5}
];

const chemistry = [
    {name:"Chemistry", c:5.5},
    {name:"Engineering Mechanics", c:4},
    {name:"Mechanical Fabrication", c:1.5}
];

function gradeOptions() {
    return `<option value="">Select Grade</option>` +
        Object.keys(gradePoints)
        .map(g => `<option value="${g}">${g}</option>`).join("");
}

function loadSubjects() {
    const batch = document.getElementById("batch").value;
    const div = document.getElementById("subjects");
    div.innerHTML = "";

    let subs = [...common];
    if (batch === "physics") subs.push(...physics);
    if (batch === "chemistry") subs.push(...chemistry);

    subs.forEach((s, i) => {
        div.innerHTML += `
            <label>${s.name} (Credits ${s.c})</label>
            <select id="g${i}">
                ${gradeOptions()}
            </select>
        `;
    });
}

function calculateSPI() {
    const roll = document.getElementById("roll").value.trim();
    const batch = document.getElementById("batch").value;
    const output = document.getElementById("output");
    const btn = document.querySelector("button");

    output.innerHTML = ""; // clear old result

    if (!roll) return alert("Enter Roll Number");
    if (!batch) return alert("Select batch first");

    let subs = [...common];
    if (batch === "physics") subs.push(...physics);
    if (batch === "chemistry") subs.push(...chemistry);

    let total = 0, score = 0;

    for (let i = 0; i < subs.length; i++) {
        const g = document.getElementById("g"+i).value;
        if (!g) return alert("Select all grades");
        total += subs[i].c;
        score += subs[i].c * gradePoints[g];
    }

    const spi = (score/total).toFixed(2);

    output.innerHTML = `
        Total Credits: ${total}<br>
        <b>SPI: ${spi}</b><br>
        Saving...
    `;

    btn.disabled = true;

    fetch("https://script.google.com/macros/s/AKfycbyAW3eWfEQYi5qHeiqZHY06Wk4gcGYSq6jPfh7J7NYSRYlF96SZRO5M30swsiFZWrK8/exec", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            roll,
            batch,
            spi
        })
    })
    .then(res => res.text())  // safer than .json()
    .then(() => {
        output.innerHTML += "<br>Saved ✅";
        btn.disabled = false;
    })
    .catch(err => {
        console.error(err);
        output.innerHTML += "<br>Save Failed ❌";
        btn.disabled = false;
    });
}
</script>
