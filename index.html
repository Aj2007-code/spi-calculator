<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPI Calculator</title>

<style>
     body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    margin: 0;
    padding: 20px;
    color: #e5e7eb;

    background:
        radial-gradient(circle at 20% 20%, rgba(56,189,248,0.15), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(99,102,241,0.15), transparent 45%),
        linear-gradient(135deg, #020617, #0f172a);
}
   .container {
    max-width: 420px;
    margin: auto;
    padding: 22px;

    background: rgba(15, 23, 42, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 25px 50px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.05);
}

    h2 {
        text-align: center;
        color: #38bdf8;
        margin-bottom: 10px;
    }

    label {
        display: block;
        margin-top: 14px;
        font-size: 15.5px;
font-weight: 500;
color: #c7d2fe;
letter-spacing: 0.3px;
transition: all 0.3s ease;
    }
label::before{
 content: ".";
color:#38bdf8
}
label:has(+select:focus){
color:#38bdf8;
transform:translateX(4px);
}
    select, button {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
    }

    select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;

    border-radius: 12px;
    border: 1px solid rgba(148,163,184,0.2);

    background: #020617;
    color: #e5e7eb;
    font-size: 15px;

    transition: all 0.3s ease;
}
select:focus {
    outline: none;
    border-color: #38bdf8;
    box-shadow:
        0 0 0 3px rgba(56,189,248,0.25),
        0 8px 20px rgba(56,189,248,0.25);
    transform: translateY(-1px);
}

    button {
        margin-top: 18px;
        background: #38bdf8;
        color: #020617;
        font-weight: bold;
        cursor: pointer;
    }

    button:active {
        transform: scale(0.98);
    }

    .result {
        margin-top: 18px;
        padding: 15px;
        background: #0f172a;
        border-radius: 12px;
        text-align: center;
        font-size: 16px;
    }

.footer {
    margin-top: 28px;
    padding: 14px 10px;
    text-align: center;

    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;

    color: #cbd5f5;
    font-family: "Segoe UI", system-ui, sans-serif;

    background: linear-gradient(
        90deg,
        rgba(56,189,248,0.08),
        rgba(99,102,241,0.08)
    );

    border-radius: 12px;
    border: 1px solid rgba(148,163,184,0.15);

    box-shadow: 0 0 18px rgba(56,189,248,0.12);

    transition: all 0.3s ease;
}

.footer span {
    color: #38bdf8;
    font-weight: 700;
}

.footer:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 28px rgba(56,189,248,0.35);
}
</style>
</head>

<body>

<div class="container">
    <h2>SPI Calculator</h2>
<label>Enter Roll Number</label>
<input type="text" id="roll" placeholder="Enter your roll no"
style="
width:100%;
padding:12px;
margin-top:6px;
border-radius:12px;
border:1px solid rgba(148,163,184,0.2);
background:#020617;
color:#e5e7eb;
font-size:15px;
">
    <label>Select Batch</label>
    <select id="batch" onchange="loadSubjects()">
        <option value="">-- Select --</option>
        <option value="physics">Physics Batch</option>
        <option value="chemistry">Chemistry Batch</option>
    </select>

    <div id="subjects"></div>

    <button onclick="calculateSPI()">Calculate SPI</button>

    <div class="result" id="output"></div>

    <div class="footer">
        Made By <span> Aarsh </span>
    </div>
</div>

<script>
const gradePoints = {
    AA:10, AB:9, BB:8, BC:7,
    CC:6, CD:5, DD:4, F:0
};

const common = [
    {name:"Mathematics", c:4},
    {name:"Indian Knowledge System", c:3},
    {name:"Computer Science", c:4.5}
];

const physics = [
    {name:"Physics", c:5.5},
    {name:"Electrical", c:4.5},
    {name:"Engineering Graphics", c:2.5}
];

const chemistry = [
    {name:"Chemistry", c:5.5},
    {name:"Engineering Mechanics", c:4},
    {name:"Mechanical Fabrication", c:1.5}
];

function gradeOptions() {
    return `<option value="">Select Grade</option>` +
        Object.keys(gradePoints)
        .map(g => `<option value="${g}">${g}</option>`).join("");
}

function loadSubjects() {
    const batch = document.getElementById("batch").value;
    const div = document.getElementById("subjects");
    div.innerHTML = "";

    let subs = [...common];
    if (batch === "physics") subs.push(...physics);
    if (batch === "chemistry") subs.push(...chemistry);

    subs.forEach((s, i) => {
        div.innerHTML += `
            <label>${s.name} (Credits ${s.c})</label>
            <select id="g${i}">
                ${gradeOptions()}
            </select>
        `;
    });
}

function calculateSPI() {
    const roll = document.getElementById("roll").value.trim();
    const batch = document.getElementById("batch").value;
    const output = document.getElementById("output");
    const btn = document.querySelector("button");

    output.innerHTML = ""; // clear old result

    if (!roll) return alert("Enter Roll Number");
    if (!batch) return alert("Select batch first");

    let subs = [...common];
    if (batch === "physics") subs.push(...physics);
    if (batch === "chemistry") subs.push(...chemistry);

    let total = 0, score = 0;

    for (let i = 0; i < subs.length; i++) {
        const g = document.getElementById("g"+i).value;
        if (!g) return alert("Select all grades");
        total += subs[i].c;
        score += subs[i].c * gradePoints[g];
    }

    const spi = (score/total).toFixed(2);

    output.innerHTML = `
        Total Credits: ${total}<br>
        <b>SPI: ${spi}</b><br>
        Saving...
    `;

    btn.disabled = true;

    fetch("https://script.google.com/macros/s/AKfycbyAW3eWfEQYi5qHeiqZHY06Wk4gcGYSq6jPfh7J7NYSRYlF96SZRO5M30swsiFZWrK8/exec", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            roll,
            batch,
            spi
        })
    })
    .then(res => res.text())  // safer than .json()
    .then(() => {
        output.innerHTML += "<br>Saved ✅";
        btn.disabled = false;
    })
    .catch(err => {
        console.error(err);
        output.innerHTML += "<br>Save Failed ❌";
        btn.disabled = false;
    });
}
</script>
</body>
</html>
